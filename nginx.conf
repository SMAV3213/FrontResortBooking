user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css text/xml text/javascript
               application/x-javascript application/json application/xml+rss;
    gzip_comp_level 6;
    gzip_min_length 1000;

    # ✅ Маппинг допустимых origin-ов
    map $http_origin $cors_origin {
        default "";
        "http://89.19.223.59"       $http_origin;
        "http://89.19.223.59:80"    $http_origin;
        "http://localhost"          $http_origin;
        "http://localhost:5173"     $http_origin;
        "http://localhost:3000"     $http_origin;
        "http://127.0.0.1:5173"    $http_origin;
    }

    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        # SPA routing
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 31d;
            add_header Cache-Control "public, immutable";
        }
    
    }
        # ✅ Proxy API requests + CORS headers на уровне nginx
        location /api/ {

            # --- Preflight (OPTIONS) — обрабатываем ЗДЕСЬ, не дёргая backend ---
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'      $cors_origin always;
                add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept, X-Requested-With' always;
                add_header 'Access-Control-Allow-Credentials' 'true' always;
                add_header 'Access-Control-Max-Age'           86400 always;
                add_header 'Content-Length'                    0;
                return 204;
            }

            # --- Проксирование на backend ---
            proxy_pass http://api:8080;
            proxy_http_version 1.1;

            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        'upgrade';
            proxy_cache_bypass $http_upgrade;

            # ✅ Убираем CORS-заголовки, которые мог добавить backend (избегаем дублей)
            proxy_hide_header 'Access-Control-Allow-Origin';
            proxy_hide_header 'Access-Control-Allow-Methods';
            proxy_hide_header 'Access-Control-Allow-Headers';
            proxy_hide_header 'Access-Control-Allow-Credentials';

            # ✅ Добавляем CORS-заголовки к ответу
            add_header 'Access-Control-Allow-Origin'      $cors_origin always;
            add_header 'Access-Control-Allow-Methods'     'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers'     'Authorization, Content-Type, Accept' always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
        }
    }
}